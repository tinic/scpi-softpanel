name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web · lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  rust:
    name: rust · fmt · clippy · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt --all --check
      # Build/lint/test the headless path (core + server). The Tauri desktop crate
      # needs system webkit deps and is exercised by desktop-release.yml instead.
      - run: cargo clippy -p scpi-core -p scpi-server --all-targets -- -D warnings
      - run: cargo test -p scpi-core -p scpi-server
