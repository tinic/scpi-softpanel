# Builds the SCPI SoftPanel desktop app for Windows, macOS, and Linux and uploads
# the installers to a draft GitHub Release. Triggered by pushing a v* tag (or
# manually). Windows/macOS artifacts are UNSIGNED until signing secrets are added
# (see the env block on the tauri-action step) — unsigned apps still run but show
# an OS "unknown publisher"/Gatekeeper warning.
name: desktop-release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri 2)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Build the web frontend (embedded into the app binary)
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @scpi/web build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: rust

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing (add as repo secrets to ship signed builds):
          #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          #   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID  (macOS notarization)
          #   TAURI_SIGNING_PRIVATE_KEY (+ _PASSWORD)  (updater signatures)
        with:
          projectPath: rust/scpi-desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'SCPI SoftPanel ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
