# Builds the SCPI SoftPanel desktop app for Windows, macOS, and Linux and uploads
# the installers to a draft GitHub Release. Triggered by pushing a v* tag (or
# manually). Windows/macOS artifacts are UNSIGNED until signing secrets are added
# (see the env block on the tauri-action step) — unsigned apps still run but show
# an OS "unknown publisher"/Gatekeeper warning.
name: desktop-release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri 2)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # NOTE: only libayatana-appindicator3-dev — libappindicator3-dev conflicts
          # with it (and Tauri 2 uses the ayatana one). rpm + libfuse2 are for the
          # .rpm bundle and AppImage packing respectively.
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev librsvg2-dev patchelf \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev rpm libfuse2

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Build the web frontend (embedded into the app binary)
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @scpi/web build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: rust

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing (add as repo secrets to ship signed builds):
          #   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          #   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID  (macOS notarization)
          #   TAURI_SIGNING_PRIVATE_KEY (+ _PASSWORD)  (updater signatures)
        with:
          projectPath: rust/scpi-desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'SCPI SoftPanel ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Attach version-less copies of the Windows/macOS installers so the
  # /releases/latest/download/<name> links in the README never break when the
  # version (baked into Tauri's filenames) changes.
  stable-links:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Attach always-latest stable-named installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release download "$TAG" -R "$REPO" -p '*.msi' -p '*-setup.exe' -p '*.dmg' -D dl
          cd dl
          shopt -s nullglob
          # Re-running a release re-downloads the stable-named assets it added last
          # time, so copy via specific globs (Tauri's versioned names) and skip if a
          # glob matched the stable file itself — keeps the step idempotent.
          stable() { [ "$1" = "$2" ] || cp -f "$1" "$2"; }
          for f in *_x64_en-US.msi; do stable "$f" SCPI-SoftPanel-windows-x64.msi; done
          for f in *_x64-setup.exe; do stable "$f" SCPI-SoftPanel-windows-x64-setup.exe; done
          for f in *aarch64.dmg;    do stable "$f" SCPI-SoftPanel-macos-apple-silicon.dmg; done
          for f in *_x64.dmg;       do stable "$f" SCPI-SoftPanel-macos-intel.dmg; done
          gh release upload "$TAG" -R "$REPO" --clobber \
            SCPI-SoftPanel-windows-x64.msi SCPI-SoftPanel-windows-x64-setup.exe \
            SCPI-SoftPanel-macos-apple-silicon.dmg SCPI-SoftPanel-macos-intel.dmg
